name: edu-llm
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: edu
      POSTGRES_PASSWORD: edu
      POSTGRES_DB: edu_llm
    ports:
      - "5432:5432"
    volumes:
      - edu_postgres:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - edu_qdrant:/qdrant/storage

volumes:
  edu_postgres:
  edu_qdrant:
